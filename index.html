<!DOCTYPE html>
<html>
<head>
<title>Fictieve Flight Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

#map{
height:100vh;
width:100vw;
}

#hud{

position:fixed;
top:10px;
left:10px;

background:black;
color:lime;

padding:10px;

font-family:monospace;

border-radius:8px;

z-index:1000;

}

.plane{

font-size:30px;

}

</style>

</head>

<body>

<div id="map"></div>

<div id="hud">

Speed: <span id="speed">0</span> km/h<br>

Distance home:
<span id="distance">0</span> km<br>

Heading:
<span id="heading">0</span>°<br>

</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>


<script>

//////////////////////////////
// REFERENTIEPUNT
//////////////////////////////

const ref_lat = 53.1337;
const ref_lon = 6.0578;

const fict_ref_lat = 53.2286;
const fict_ref_lon = 5.7600;

const scale = 50;


//////////////////////////////
// FICTIEVE THUISBASIS
//////////////////////////////

const home_lat = fict_ref_lat;
const home_lon = fict_ref_lon;


//////////////////////////////
// KAART
//////////////////////////////

const map =
L.map('map')
.setView(
[fict_ref_lat,fict_ref_lon],
13
);

L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

{maxZoom:19}

).addTo(map);


//////////////////////////////
// VLIEGTUIG ICOON
//////////////////////////////

const planeIcon = L.divIcon({

html:'✈️',

className:'plane',

iconSize:[30,30]

});


let marker =
L.marker(
[fict_ref_lat,fict_ref_lon],
{icon:planeIcon}
).addTo(map);


//////////////////////////////
// POSITIE OMREKENING
//////////////////////////////

function gpsToFict(lat,lon){

let dlat =
lat - ref_lat;

let dlon =
lon - ref_lon;

let fict_lat =
fict_ref_lat +
dlat * scale;

let fict_lon =
fict_ref_lon +
dlon * scale;

return [fict_lat,fict_lon];

}


//////////////////////////////
// AFSTAND BEREKENEN
//////////////////////////////

function distance(lat1,lon1,lat2,lon2){

let R=6371;

let dLat =
(lat2-lat1) *
Math.PI/180;

let dLon =
(lon2-lon1) *
Math.PI/180;

let a=

Math.sin(dLat/2)*
Math.sin(dLat/2)+

Math.cos(lat1*Math.PI/180)*

Math.cos(lat2*Math.PI/180)*

Math.sin(dLon/2)*

Math.sin(dLon/2);

let c=
2*Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R*c;

}


//////////////////////////////
// RICHTING
//////////////////////////////

function bearing(lat1,lon1,lat2,lon2){

let y =
Math.sin(
(lon2-lon1)*
Math.PI/180
)

*
Math.cos(lat2*Math.PI/180);

let x =

Math.cos(lat1*Math.PI/180)*

Math.sin(lat2*Math.PI/180)

-

Math.sin(lat1*Math.PI/180)*

Math.cos(lat2*Math.PI/180)*

Math.cos(
(lon2-lon1)*
Math.PI/180
);

let brng =
Math.atan2(y,x);

brng =
brng * 180/Math.PI;

return (brng+360)%360;

}



//////////////////////////////
// SPEED
//////////////////////////////

let lastLat=null;
let lastLon=null;
let lastTime=null;



navigator.geolocation.watchPosition(

pos=>{

let lat=
pos.coords.latitude;

let lon=
pos.coords.longitude;

let now=
Date.now();


let fict =
gpsToFict(lat,lon);


marker.setLatLng(fict);

map.setView(fict);


//////////////////////////////
// SNELHEID
//////////////////////////////

if(lastLat){

let dist =
distance(
lastLat,
lastLon,
lat,
lon
);

let dt=
(now-lastTime)/1000;

let speed=
(dist/dt)*3600;

speed =
speed*scale;

document
.getElementById("speed")
.innerText=
speed.toFixed(1);

}


//////////////////////////////
// AFSTAND TOT BASIS
//////////////////////////////

let distHome=

distance(

fict[0],
fict[1],

home_lat,
home_lon

);

document
.getElementById("distance")
.innerText=
distHome.toFixed(1);



//////////////////////////////
// RICHTING
//////////////////////////////

if(lastLat){

let head=

bearing(
lastLat,
lastLon,
lat,
lon
);

document
.getElementById("heading")
.innerText=
head.toFixed(0);

marker
.getElement()
.style
.transform=
"rotate("+head+"deg)";

}



lastLat=lat;
lastLon=lon;
lastTime=now;


},

error=>{

alert(error.message);

},

{

enableHighAccuracy:true

}

);


</script>

</body>

</html>
