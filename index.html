<!DOCTYPE html>
<html>

<head>

<title>Fictieve Flight HUD</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

#map{
height:100vh;
width:100vw;
}

#hud{

position:fixed;

top:10px;
left:10px;

background:rgba(0,0,0,0.75);

color:#00ff00;

padding:12px;

font-family:monospace;

border-radius:8px;

z-index:1000;

font-size:14px;

}

.leaflet-div-icon{

background:transparent;

border:none;

}

#planeSymbol{

font-size:32px;

transform-origin:center;

transition:transform 0.2s linear;

filter: drop-shadow(0 0 4px #00ff00);

}

</style>

</head>

<body>

<div id="map"></div>

<div id="hud">

SPD:
<span id="speed">0</span> km/h<br>

HDG:
<span id="heading">0</span>°<br>

DST HOME:
<span id="distance">0</span> km<br>

HOME BRG:
<span id="homeBearing">0</span>°

</div>


<script src=
"https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>


<script>

//////////////////////////
// CALIBRATIE
//////////////////////////

const ref_lat=53.1337;
const ref_lon=6.0578;

const fict_ref_lat=53.2286;
const fict_ref_lon=5.7600;

const scale=50;


//////////////////////////
// HOME BASE
//////////////////////////

const home_lat=fict_ref_lat;
const home_lon=fict_ref_lon;


//////////////////////////
// KAART
//////////////////////////

const map=

L.map('map')
.setView(
[fict_ref_lat,fict_ref_lon],
13
);


L.tileLayer(

'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

{maxZoom:19}

).addTo(map);


//////////////////////////
// RADAR RINGEN
//////////////////////////

for(let i=1;i<=3;i++){

L.circle(

[home_lat,home_lon],

{

radius:i*10000,

color:'lime',

fill:false,

weight:1,

opacity:0.6

}

).addTo(map);

}


//////////////////////////
// VLIEGTUIG
//////////////////////////

const planeIcon=

L.divIcon({

html:'<div id="planeSymbol">✈</div>',

iconSize:[30,30],

iconAnchor:[15,15]

});


let marker=

L.marker(
[fict_ref_lat,fict_ref_lon],
{icon:planeIcon}
).addTo(map);


//////////////////////////
// HOME MARKER
//////////////////////////

L.circleMarker(

[home_lat,home_lon],

{

radius:6,

color:'red'

}

).addTo(map);


//////////////////////////
// TRAIL
//////////////////////////

let trail=[];

let trailLine=

L.polyline(
trail,
{
color:'lime',
weight:2,
opacity:0.7
}
).addTo(map);


//////////////////////////
// VARIABELEN
//////////////////////////

let smoothHeading=0;

let lastLat=null;
let lastLon=null;
let lastTime=null;


//////////////////////////
// OMREKENING
//////////////////////////

function gpsToFict(lat,lon){

let dlat=
lat-ref_lat;

let dlon=
lon-ref_lon;

let flat=
fict_ref_lat+
dlat*scale;

let flon=
fict_ref_lon+
dlon*scale;

return [flat,flon];

}


//////////////////////////
// AFSTAND
//////////////////////////

function distance(lat1,lon1,lat2,lon2){

let R=6371;

let dLat=
(lat2-lat1)*
Math.PI/180;

let dLon=
(lon2-lon1)*
Math.PI/180;

let a=

Math.sin(dLat/2)**2+

Math.cos(lat1*Math.PI/180)*

Math.cos(lat2*Math.PI/180)*

Math.sin(dLon/2)**2;

let c=

2*Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R*c;

}


//////////////////////////
// BEARING
//////////////////////////

function bearing(lat1,lon1,lat2,lon2){

let y=

Math.sin(
(lon2-lon1)*
Math.PI/180
)

*
Math.cos(lat2*Math.PI/180);

let x=

Math.cos(lat1*Math.PI/180)*

Math.sin(lat2*Math.PI/180)

-

Math.sin(lat1*Math.PI/180)*

Math.cos(lat2*Math.PI/180)*

Math.cos(
(lon2-lon1)*
Math.PI/180
);

let brng=
Math.atan2(y,x);

brng=
brng*180/Math.PI;

return (brng+360)%360;

}


//////////////////////////
// GPS TRACKING
//////////////////////////

navigator.geolocation.watchPosition(

pos=>{

let lat=
pos.coords.latitude;

let lon=
pos.coords.longitude;

let now=
Date.now();


let fict=
gpsToFict(lat,lon);


marker.setLatLng(fict);

map.panTo(fict);


//////////////////////////
// TRAIL
//////////////////////////

trail.push(fict);

if(trail.length>200)
trail.shift();

trailLine.setLatLngs(trail);


//////////////////////////
// SPEED
//////////////////////////

if(lastLat){

let dist=

distance(
lastLat,
lastLon,
lat,
lon
);

let dt=
(now-lastTime)/1000;

let speed=
(dist/dt)*3600;

speed=
speed*scale;

document
.getElementById("speed")
.innerText=
speed.toFixed(0);

}


//////////////////////////
// HEADING
//////////////////////////

if(lastLat){

let newHeading=

bearing(
lastLat,
lastLon,
lat,
lon
);


let diff=
newHeading-
smoothHeading;

if(diff>180)
diff-=360;

if(diff<-180)
diff+=360;


smoothHeading+=
diff*0.15;


document
.getElementById("heading")
.innerText=
smoothHeading.toFixed(0);


let plane=

document.getElementById("planeSymbol");

if(plane){

plane.style.transform=

"rotate("
+
smoothHeading+
"deg)";

}

}


//////////////////////////
// DISTANCE HOME
//////////////////////////

let distHome=

distance(

fict[0],
fict[1],

home_lat,
home_lon

);

document
.getElementById("distance")
.innerText=
distHome.toFixed(1);


//////////////////////////
// HOME BEARING
//////////////////////////

let homeBrg=

bearing(

fict[0],
fict[1],

home_lat,
home_lon

);

document
.getElementById("homeBearing")
.innerText=
homeBrg.toFixed(0);


lastLat=lat;
lastLon=lon;
lastTime=now;


},

error=>{

alert(error.message);

},

{

enableHighAccuracy:true

}

);


</script>

</body>

</html>
